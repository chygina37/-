<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TICKR — K-POP Ticketing Helper</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f7f5; --bg2: #f0eeeb; --surface: #ffffff; --border: #e5e2dd; --border2: #d4d0ca;
    --accent: #ff3c00; --accent2: #ffcc00; --accent-light: rgba(255,60,0,0.08);
    --text: #1a1814; --text2: #3d3a35; --muted: #8a8680; --card-bg: #ffffff;
    --gray: #f2f0ec; --gray2: #e8e5e0;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR','Noto Sans SC','Noto Sans',sans-serif; font-weight: 300; overflow-x: hidden; }
  body.lang-en { font-family: 'Noto Sans', sans-serif; }
  body.lang-zh { font-family: 'Noto Sans SC', sans-serif; }
  body.lang-zhtw { font-family: 'Noto Sans TC', sans-serif; }

  .lang-switcher { display: flex; gap: 4px; }
  .lang-btn { background: transparent; border: 1px solid var(--border2); color: var(--muted); padding: 5px 11px; font-size: 12px; cursor: pointer; font-family: inherit; transition: .2s; border-radius: 3px; }
  .lang-btn:hover { border-color: var(--text2); color: var(--text); }
  .lang-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 60px; background: rgba(248,247,245,.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); gap: 12px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: .08em; color: var(--text); flex-shrink: 0; }
  .logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 18px; list-style: none; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 12px; transition: color .2s; font-weight: 400; white-space: nowrap; }
  .nav-links a:hover { color: var(--text); }
  .nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .nav-cta { background: var(--accent); color: #fff; border: none; padding: 8px 18px; font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%); transition: background .2s; white-space: nowrap; }
  .nav-cta:hover { background: #e03000; }

  /* HERO */
  .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 100px 48px 80px; position: relative; overflow: hidden; }
  .hero-bg { position: absolute; inset: 0; z-index: 0; background: radial-gradient(ellipse 70% 60% at 75% 40%, rgba(255,60,0,0.07) 0%, transparent 65%), radial-gradient(ellipse 50% 40% at 15% 70%, rgba(255,204,0,0.05) 0%, transparent 60%); }
  .hero-grid { position: absolute; inset: 0; z-index: 0; opacity: .035; background-image: linear-gradient(var(--text) 1px, transparent 1px), linear-gradient(90deg, var(--text) 1px, transparent 1px); background-size: 60px 60px; }
  .hero-inner { position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
  .hero-content { max-width: 600px; }
  .hero-tag { display: inline-block; border: 1px solid var(--accent); color: var(--accent); font-size: 11px; letter-spacing: .2em; padding: 5px 14px; margin-bottom: 28px; animation: fadeUp .6s ease both; background: var(--accent-light); }
  .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(60px,9vw,130px); line-height: .92; letter-spacing: .02em; animation: fadeUp .6s .1s ease both; }
  .hero-title .outline { -webkit-text-stroke: 2px var(--text); color: transparent; }
  .hero-title .fill { color: var(--accent); }
  .hero-sub { margin-top: 32px; font-size: 15px; line-height: 1.8; color: var(--muted); max-width: 500px; animation: fadeUp .6s .2s ease both; }
  .hero-btns { margin-top: 40px; display: flex; gap: 16px; flex-wrap: wrap; animation: fadeUp .6s .3s ease both; }
  .hero-right { animation: fadeUp .6s .3s ease both; }
  .btn-primary { background: var(--accent); color: #fff; border: none; padding: 16px 36px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; clip-path: polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%); transition: background .2s,transform .1s; }
  .btn-primary:hover { background: #e03000; transform: translateY(-1px); }
  .btn-outline { background: transparent; color: var(--text); border: 1.5px solid var(--border2); padding: 16px 36px; font-family: inherit; font-size: 14px; font-weight: 400; cursor: pointer; transition: border-color .2s,transform .1s; }
  .btn-outline:hover { border-color: var(--text); transform: translateY(-1px); }
  .hero-ticker { position: absolute; bottom: 0; left: 0; right: 0; z-index: 1; border-top: 1px solid var(--border); background: rgba(248,247,245,.8); overflow: hidden; padding: 14px 0; }
  .ticker-track { display: flex; gap: 60px; animation: ticker 24s linear infinite; white-space: nowrap; }
  .ticker-item { font-size: 12px; letter-spacing: .08em; color: var(--muted); }
  .ticker-item span { color: var(--accent); margin-right: 8px; }

  .section { padding: 100px 48px; }
  .section-label { font-size: 11px; letter-spacing: .2em; color: var(--accent); margin-bottom: 16px; font-weight: 500; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px,6vw,72px); line-height: 1; margin-bottom: 48px; color: var(--text); }

  .countdown-card { background: var(--surface); border: 1px solid var(--border); padding: 40px; max-width: 700px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .concert-info { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; }
  .concert-badge { background: var(--accent); color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: .1em; padding: 6px 14px; clip-path: polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%); }
  .concert-name { font-size: 20px; font-weight: 500; color: var(--text); }
  .concert-site { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .countdown-display { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
  .cd-block { flex: 1; min-width: 80px; background: var(--gray); border: 1px solid var(--border); padding: 20px 16px; text-align: center; }
  .cd-num { font-family: 'Bebas Neue', sans-serif; font-size: 52px; line-height: 1; color: var(--accent); }
  .cd-label { font-size: 11px; letter-spacing: .1em; color: var(--muted); margin-top: 6px; }
  .cd-actions { display: flex; gap: 12px; }
  .cd-btn { flex: 1; padding: 14px; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; transition: .2s; border: none; }
  .cd-btn.primary { background: var(--accent); color: #fff; }
  .cd-btn.primary:hover { background: #e03000; }
  .cd-btn.secondary { background: transparent; color: var(--text); border: 1.5px solid var(--border2); }
  .cd-btn.secondary:hover { border-color: var(--text); }

  .features-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .feature-card { background: var(--surface); padding: 36px 32px; transition: background .2s; cursor: pointer; }
  .feature-card:hover { background: var(--gray); }
  .feature-icon { font-size: 28px; margin-bottom: 20px; display: block; }
  .feature-title { font-size: 16px; font-weight: 500; margin-bottom: 10px; color: var(--text); }
  .feature-desc { font-size: 13px; line-height: 1.8; color: var(--muted); }
  .feature-tag { display: inline-block; margin-top: 14px; font-size: 10px; letter-spacing: .12em; padding: 3px 10px; border: 1px solid var(--border2); color: var(--muted); }
  .feature-tag.hot { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .feature-link { display: block; margin-top: 10px; font-size: 12px; color: var(--accent); font-weight: 500; }

  .alert-section { background: var(--gray); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .alert-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; padding: 100px 48px; }
  .alert-form { display: flex; flex-direction: column; gap: 14px; }
  .form-row { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 12px; letter-spacing: .08em; color: var(--muted); font-weight: 500; }
  .form-input { background: var(--surface); border: 1px solid var(--border2); color: var(--text); padding: 14px 16px; font-family: inherit; font-size: 14px; outline: none; transition: border-color .2s; }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--border2); }
  .form-select { background: var(--surface); border: 1px solid var(--border2); color: var(--text); padding: 14px 16px; font-family: inherit; font-size: 14px; outline: none; appearance: none; cursor: pointer; }
  .form-submit { background: var(--accent); color: #fff; border: none; padding: 16px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 6px; transition: background .2s; }
  .form-submit:hover { background: #e03000; }

  .sites-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 12px; margin-top: 48px; }
  .site-card { background: var(--surface); border: 1px solid var(--border); padding: 24px 20px; display: flex; flex-direction: column; gap: 10px; cursor: pointer; transition: border-color .2s, box-shadow .2s; }
  .site-card:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(255,60,0,0.08); }
  .site-name { font-size: 15px; font-weight: 500; color: var(--text); }
  .site-diff { font-size: 11px; padding: 2px 8px; display: inline-block; border-radius: 2px; }
  .diff-hard { background: rgba(255,60,0,.1); color: #d43000; }
  .diff-med  { background: rgba(200,150,0,.1); color: #a07800; }
  .diff-easy { background: rgba(30,160,80,.1); color: #1a8040; }
  .site-tip { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .site-open-btn { margin-top: auto; background: transparent; border: 1px solid var(--border2); color: var(--muted); padding: 8px; font-size: 12px; cursor: pointer; font-family: inherit; transition: .2s; }
  .site-open-btn:hover { border-color: var(--accent); color: var(--accent); }

  .feed { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); max-width: 700px; }
  .feed-item { background: var(--surface); padding: 20px 24px; display: flex; align-items: flex-start; gap: 16px; }
  .feed-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .dot-success { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,.4); }
  .dot-fail    { background: var(--accent); }
  .dot-tip     { background: var(--accent2); }
  .feed-text { font-size: 14px; line-height: 1.7; color: var(--text2); }
  .feed-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .community-btn { display: inline-block; margin-top: 32px; background: var(--accent); color: #fff; padding: 16px 36px; font-family: inherit; font-size: 14px; font-weight: 500; text-decoration: none; clip-path: polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%); transition: background .2s, transform .1s; }
  .community-btn:hover { background: #e03000; transform: translateY(-1px); }

  footer { padding: 60px 48px 40px; border-top: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; gap: 32px; }
  .footer-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 32px; }
  .footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: .06em; color: var(--text); }
  .footer-logo span { color: var(--accent); }
  .footer-tagline { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .footer-links { display: flex; gap: 32px; flex-wrap: wrap; }
  .footer-links a { color: var(--muted); font-size: 13px; text-decoration: none; transition: color .2s; }
  .footer-links a:hover { color: var(--text); }
  .footer-bottom { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .footer-copy { font-size: 12px; color: var(--muted); }
  .footer-badge { font-size: 11px; letter-spacing: .06em; color: var(--muted); border: 1px solid var(--border2); padding: 4px 12px; }

  .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4); align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); padding: 40px; max-width: 480px; width: 90%; animation: fadeUp .3s ease; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
  .modal h3 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; margin-bottom: 16px; color: var(--text); }
  .modal p { font-size: 14px; color: var(--muted); line-height: 1.8; margin-bottom: 24px; }
  .modal-close { background: transparent; border: 1px solid var(--border2); color: var(--muted); padding: 10px 24px; cursor: pointer; font-family: inherit; font-size: 13px; transition: .2s; }
  .modal-close:hover { border-color: var(--text); color: var(--text); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
  @keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }

  @media (max-width: 900px) {
    .hero-inner { grid-template-columns: 1fr; }
    .hero-right { display: none; }
  }
  @media (max-width: 768px) {
    nav { padding: 0 16px; }
    .nav-links { display: none; }
    .hero { padding: 80px 20px 80px; }
    .section { padding: 60px 20px; }
    .alert-inner { grid-template-columns: 1fr; gap: 40px; padding: 60px 20px; }
    footer { padding: 40px 20px 32px; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">TICK<span>R</span></div>
  <ul class="nav-links">
    <li><a href="#countdown">카운트다운</a></li>
    <li><a href="#features">기능</a></li>
    <li><a href="#sites">사이트 공략</a></li>
    <li><a href="reviews.html">커뮤니티</a></li>
    <li><a href="teams.html">팀 모집</a></li>
    <li><a href="difficulty.html">난이도</a></li>
    <li><a href="schedule.html">일정</a></li>
    <li><a href="dday.html">D-day 루틴</a></li>
    <li><a href="tips.html">꿀팁</a></li>
    <li><a href="kakao.html">카카오</a></li>
  </ul>
  <div class="nav-right">
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('zh')">简体</button>
      <button class="lang-btn" onclick="setLang('zhtw')">繁體</button>
    </div>
    <button class="nav-cta" onclick="openModal()" data-i18n="nav_cta"></button>
  </div>
</nav>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-inner">
    <div class="hero-content">
      <div class="hero-tag" data-i18n="hero_tag"></div>
      <h1 class="hero-title"><span class="outline">BEAT</span><br><span class="fill">THE</span><br><span class="outline">QUEUE</span></h1>
      <p class="hero-sub" data-i18n="hero_sub"></p>
      <div class="hero-btns">
        <button class="btn-primary" onclick="openModal()" data-i18n="hero_btn1"></button>
        <button class="btn-outline" onclick="document.getElementById('features').scrollIntoView({behavior:'smooth'})" data-i18n="hero_btn2"></button>
      </div>
    </div>
    <div class="hero-right">
      <div class="countdown-card" style="max-width:100%">
        <div class="concert-info">
          <div class="concert-badge">D-DAY</div>
          <div>
            <div class="concert-name" data-i18n="cd_concert_name"></div>
            <div class="concert-site" data-i18n="cd_concert_site"></div>
          </div>
        </div>
        <div class="countdown-display">
          <div class="cd-block"><div class="cd-num" id="cd-days">00</div><div class="cd-label" data-i18n="cd_days"></div></div>
          <div class="cd-block"><div class="cd-num" id="cd-hours">00</div><div class="cd-label" data-i18n="cd_hours"></div></div>
          <div class="cd-block"><div class="cd-num" id="cd-mins">00</div><div class="cd-label" data-i18n="cd_mins"></div></div>
          <div class="cd-block"><div class="cd-num" id="cd-secs" style="color:var(--accent2)">00</div><div class="cd-label" data-i18n="cd_secs"></div></div>
        </div>
        <div class="cd-actions">
          <button class="cd-btn primary" onclick="openModal()" data-i18n="cd_btn_alert"></button>
          <button class="cd-btn secondary" onclick="openSiteNow('https://tickets.interpark.com')" data-i18n="cd_btn_open"></button>
        </div>
      </div>
    </div>
  </div>
  <div class="hero-ticker"><div class="ticker-track" id="tickerTrack"></div></div>
</section>

<section class="section" id="countdown" style="display:none;"></section>

<section class="section" id="features">
  <div class="section-label">FEATURES</div>
  <h2 class="section-title" data-i18n="feat_title"></h2>
  <div class="features-grid" id="featuresGrid"></div>
</section>

<section class="alert-section" id="alert">
  <div class="alert-inner">
    <div>
      <div class="section-label">ALERT</div>
      <h2 class="section-title" style="margin-bottom:20px;" data-i18n="alert_title"></h2>
      <p style="font-size:14px;color:var(--muted);line-height:1.8;" data-i18n="alert_desc"></p>
    </div>
    <div class="alert-form">
      <div class="form-row">
        <label class="form-label" data-i18n="form_artist_label"></label>
        <input class="form-input" type="text" id="form_artist_input" data-i18n-ph="form_artist_placeholder">
      </div>
      <div class="form-row">
        <label class="form-label" data-i18n="form_site_label"></label>
        <select class="form-select" id="form_site_select"></select>
      </div>
      <div class="form-row">
        <label class="form-label" data-i18n="form_contact_label"></label>
        <input class="form-input" type="text" id="form_contact_input" data-i18n-ph="form_contact_placeholder">
      </div>
      <button class="form-submit" id="formSubmitBtn" onclick="showSuccess()"></button>
    </div>
  </div>
</section>

<section class="section" id="sites">
  <div class="section-label">SITE GUIDE</div>
  <h2 class="section-title" data-i18n="sites_title"></h2>
  <div class="sites-grid" id="sitesGrid"></div>
</section>

<section class="section" id="community" style="padding-top:0;">
  <div class="section-label">COMMUNITY</div>
  <h2 class="section-title" data-i18n="feed_title"></h2>
  <div class="feed" id="feed"></div>
  <a href="reviews.html" class="community-btn" data-i18n="community_btn"></a>
</section>

<footer>
  <div class="footer-top">
    <div>
      <div class="footer-logo">TICK<span>R</span></div>
      <div class="footer-tagline" data-i18n="footer_tagline"></div>
    </div>
    <div class="footer-links">
      <a href="#" data-i18n="footer_about"></a>
      <a href="#" data-i18n="footer_terms"></a>
      <a href="#" data-i18n="footer_privacy"></a>
      <a href="#" data-i18n="footer_contact_link"></a>
    </div>
  </div>
  <div class="footer-bottom">
    <div class="footer-copy">© 2025 TICKR. All rights reserved.</div>
    <div class="footer-badge" data-i18n="footer_badge"></div>
  </div>
</footer>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <h3 data-i18n="modal_title"></h3>
    <p data-i18n="modal_desc"></p>
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('active')" data-i18n="modal_close"></button>
  </div>
</div>

<script>
const i18n = {
  ko: {
    nav_cta:'무료 시작',
    hero_tag:'K-POP 티켓팅 도우미',
    hero_sub:'GD, BTS, 아이유… 극악의 티켓팅도 전략이 있으면 달라집니다. 오픈 알림부터 취소표까지, TICKR이 함께합니다.',
    hero_btn1:'지금 시작하기', hero_btn2:'기능 보기',
    cd_concert_name:'GD 월드투어 서울', cd_concert_site:'인터파크 티켓 · 오픈 예정',
    cd_days:'일', cd_hours:'시', cd_mins:'분', cd_secs:'초',
    cd_btn_alert:'🔔 오픈 알림 받기', cd_btn_open:'지금 사이트 열기 →',
    feat_title:'이런 기능들로\n성공률을 높여요',
    alert_title:'놓치면\n후회할 공연,\n알림 등록',

      {type:'tip',text:'💡 Interpark開票前30秒按F5反而會被踢出，老實等著就好！',meta:'23分鐘前 · 匿名'},
      {type:'success',text:'收到退票提醒，搶到IU演唱會S區！上午11:40突然出現的',meta:'1小時前 · 匿名'},
      {type:'tip',text:'💡 PC Chrome無痕模式速度更快，提前清理快取',meta:'2小時前 · 匿名'},
    ],
    ticker:['🔥 GD首爾演唱會開票倒數D-3','✅ IU演唱會退票出現','⚡ BTS快閃票即將開票','🎯 SEVENTEEN追加場次確認','🔔 NewJeans粉絲見面會提醒登記1240人','📈 LE SSERAFIM演唱會難度：極難'],
  }
};

let currentLang = 'ko';

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang === 'zhtw' ? 'zh-TW' : lang;
  document.body.className = lang==='en'?'lang-en':lang==='zh'?'lang-zh':lang==='zhtw'?'lang-zhtw':'';
  document.querySelectorAll('.lang-btn').forEach((btn,i) => btn.classList.toggle('active', ['ko','en','zh','zhtw'][i] === lang));
  renderAll();
}

function renderAll() {
  const d = i18n[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = d[el.getAttribute('data-i18n')];
    if (v !== undefined) el.innerHTML = v.replace(/\n/g,'<br>');
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const v = d[el.getAttribute('data-i18n-ph')];
    if (v) el.placeholder = v;
  });
  document.getElementById('formSubmitBtn').textContent = d.form_submit;
  const sel = document.getElementById('form_site_select');
  sel.innerHTML = d.form_sites.map(o=>`<option>${o}</option>`).join('');
  renderFeatures(); renderSites(); renderFeed(); renderTicker();
}

function renderFeatures() {
  document.getElementById('featuresGrid').innerHTML = i18n[currentLang].features.map(f=>`
    <div class="feature-card" ${f.url?`onclick="location.href='${f.url}'"`:''}>
      <span class="feature-icon">${f.icon}</span>
      <div class="feature-title">${f.title}</div>
      <div class="feature-desc">${f.desc}</div>
      <span class="feature-tag${f.hot?' hot':''}">${f.tag}</span>
      ${f.url?`<span class="feature-link">바로가기 →</span>`:''}
    </div>`).join('');
}

function renderSites() {
  document.getElementById('sitesGrid').innerHTML = i18n[currentLang].sites.map(s=>`
    <div class="site-card">
      <div class="site-name">${s.name}</div>
      <span class="site-diff ${s.cls}">${s.diff}</span>
      <div class="site-tip">${s.tip}</div>
      <button class="site-open-btn" onclick="openSiteNow('${s.url}')">${s.btn}</button>
    </div>`).join('');
}

function renderFeed() {
  document.getElementById('feed').innerHTML = i18n[currentLang].feed.map(f=>`
    <div class="feed-item">
      <div class="feed-dot ${f.type==='success'?'dot-success':f.type==='fail'?'dot-fail':'dot-tip'}"></div>
      <div><div class="feed-text">${f.text}</div><div class="feed-meta">${f.meta}</div></div>
    </div>`).join('');
}

function renderTicker() {
  const track = document.getElementById('tickerTrack');
  const items = [...i18n[currentLang].ticker, ...i18n[currentLang].ticker];
  track.innerHTML = items.map(t=>`<span class="ticker-item"><span>◆</span>${t}</span>`).join('');
}

function getTargetDate() {
  const now = new Date(), t = new Date(now);
  t.setHours(20,0,0,0);
  if (t <= now) t.setDate(t.getDate()+1);
  return t;
}
function updateCountdown() {
  const diff = getTargetDate() - new Date();
  if (diff <= 0) { updateCountdown(); return; }
  document.getElementById('cd-days').textContent  = String(Math.floor(diff/86400000)).padStart(2,'0');
  document.getElementById('cd-hours').textContent = String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
  document.getElementById('cd-mins').textContent  = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
  document.getElementById('cd-secs').textContent  = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
}
setInterval(updateCountdown, 1000);
updateCountdown();

function openModal() { document.getElementById('alert').scrollIntoView({behavior:'smooth'}); }
function closeModal(e) { if (e.target===document.getElementById('modal')) document.getElementById('modal').classList.remove('active'); }
function openSiteNow(url) { window.open(url,'_blank'); }

async function showSuccess() {
  const btn = document.getElementById('formSubmitBtn');
  const email = document.getElementById('form_contact_input').value;
  const artist = document.getElementById('form_artist_input').value;
  const site = document.getElementById('form_site_select').value;
  if (!email || !artist) {
    alert(currentLang==='ko'?'아티스트와 연락처를 입력해주세요!':'Please enter artist and contact!');
    return;
  }
  btn.textContent = currentLang==='ko'?'등록 중...':'Sending...';
  btn.style.background = '#aaa'; btn.disabled = true;
  try {
    const res = await fetch('/api/send-alert', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, artist, site })
    });
    const data = await res.json();
    if (data.success) {
      btn.textContent = i18n[currentLang].form_success;
      btn.style.background = '#166534';
      document.getElementById('form_artist_input').value = '';
      document.getElementById('form_contact_input').value = '';
      setTimeout(()=>{ btn.textContent=i18n[currentLang].form_submit; btn.style.background=''; btn.disabled=false; }, 3000);
    } else { throw new Error(data.error); }
  } catch(e) {
    btn.textContent = '❌ 오류 발생'; btn.style.background = '#991b1b';
    setTimeout(()=>{ btn.textContent=i18n[currentLang].form_submit; btn.style.background=''; btn.disabled=false; }, 3000);
  }
}

renderAll();
</script>
</body>
