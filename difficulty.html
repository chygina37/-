<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TICKR — 공연별 난이도 지수</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f7f5; --surface: #ffffff; --border: #e5e2dd; --border2: #d4d0ca;
    --accent: #ff3c00; --accent-light: rgba(255,60,0,0.08);
    --text: #1a1814; --text2: #3d3a35; --muted: #8a8680; --gray: #f2f0ec;
    --d1: #dc2626; --d1-bg: rgba(220,38,38,0.08);
    --d2: #ea580c; --d2-bg: rgba(234,88,12,0.08);
    --d3: #ca8a04; --d3-bg: rgba(202,138,4,0.08);
    --d4: #16a34a; --d4-bg: rgba(22,163,74,0.08);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{padding-top:60px;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;}

  nav{position:fixed;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;background:rgba(248,247,245,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.08em;color:var(--text);text-decoration:none;}
  .logo span{color:var(--accent);}
  .nav-links{display:flex;gap:14px;list-style:none;}
  .nav-links a{color:var(--muted);text-decoration:none;font-size:11px;font-weight:400;transition:color .2s;}
  .nav-links a:hover,.nav-links a.active{color:var(--text);}
  .nav-right{display:flex;align-items:center;gap:12px;}
  .nav-cta{background:var(--accent);color:#fff;border:none;padding:9px 20px;font-size:13px;font-weight:500;cursor:pointer;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);font-family:'Noto Sans KR',sans-serif;transition:background .2s;}
  .nav-cta:hover{background:#e03000;}

  .hero{padding:60px 48px 48px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 80% 50%,rgba(255,60,0,0.05),transparent 70%);pointer-events:none;}
  .hero-tag{display:inline-block;border:1px solid var(--accent);color:var(--accent);background:var(--accent-light);font-size:11px;letter-spacing:.2em;padding:5px 14px;margin-bottom:20px;text-transform:uppercase;}
  .hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,8vw,96px);line-height:.95;margin-bottom:20px;}
  .hero h1 span{color:var(--accent);}
  .hero p{color:var(--muted);font-size:15px;max-width:500px;line-height:1.7;}

  /* 난이도 범례 */
  .legend{display:flex;gap:12px;margin-top:32px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);padding:8px 14px;border-radius:4px;}
  .legend-dot{width:10px;height:10px;border-radius:50%;}
  .legend-label{font-size:12px;font-weight:500;}

  .main{max-width:1200px;margin:0 auto;padding:40px 48px;}

  /* 검색/필터 */
  .controls{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap;}
  .search-input{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:10px 16px;font-size:14px;border-radius:4px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;}
  .search-input:focus{border-color:var(--accent);}
  .search-input::placeholder{color:#ccc;}
  .filter-btn{background:none;border:1px solid var(--border2);color:var(--muted);padding:8px 16px;font-size:12px;font-weight:700;border-radius:4px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:.2s;white-space:nowrap;}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* 난이도 카드 그리드 */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
  .diff-card{background:var(--surface);border:1px solid var(--border);padding:24px;border-radius:4px;transition:box-shadow .2s,transform .2s;animation:fadeUp .4s ease both;cursor:pointer;}
  .diff-card:hover{box-shadow:0 8px 32px rgba(0,0,0,0.08);transform:translateY(-2px);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  .card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
  .card-artist{font-size:13px;color:var(--accent);font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
  .diff-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:3px;white-space:nowrap;}
  .diff-extreme{background:var(--d1-bg);color:var(--d1);}
  .diff-hard{background:var(--d2-bg);color:var(--d2);}
  .diff-medium{background:var(--d3-bg);color:var(--d3);}
  .diff-easy{background:var(--d4-bg);color:var(--d4);}

  .card-concert{font-size:16px;font-weight:700;margin-bottom:12px;line-height:1.3;}
  .card-site{font-size:12px;color:var(--muted);margin-bottom:16px;}

  /* 진행바 */
  .progress-section{margin-bottom:12px;}
  .progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;}
  .progress-bar{height:6px;background:var(--gray);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:3px;transition:width .8s ease;}
  .fill-success{background:#22c55e;}
  .fill-fail{background:var(--accent);}

  .card-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
  .stat-item{text-align:center;}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text);}
  .stat-label{font-size:10px;color:var(--muted);margin-top:2px;}

  /* 별점 */
  .card-rating{display:flex;align-items:center;gap:6px;margin-top:12px;}
  .stars{color:var(--accent);font-size:12px;}
  .rating-num{font-size:12px;color:var(--muted);}

  .empty-state{text-align:center;padding:80px;color:var(--muted);}
  .loading-state{text-align:center;padding:80px;color:var(--muted);}
  .loading-spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* 상세 모달 */
  .modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);align-items:center;justify-content:center;}
  .modal-overlay.active{display:flex;}
  .modal{background:#fff;border:1px solid var(--border);padding:36px;max-width:500px;width:90%;border-radius:4px;box-shadow:0 20px 60px rgba(0,0,0,.12);animation:fadeUp .3s ease;max-height:80vh;overflow-y:auto;}
  .modal h3{font-family:'Bebas Neue',sans-serif;font-size:28px;margin-bottom:4px;}
  .modal-artist{color:var(--accent);font-size:13px;font-weight:700;margin-bottom:20px;}
  .review-item{padding:14px 0;border-bottom:1px solid var(--border);}
  .review-item:last-child{border-bottom:none;}
  .review-result{font-size:11px;font-weight:700;margin-bottom:4px;}
  .review-title{font-size:14px;font-weight:500;margin-bottom:4px;}
  .review-content{font-size:13px;color:var(--muted);line-height:1.6;}
  .review-nick{font-size:11px;color:#aaa;margin-top:4px;}
  .modal-close{background:none;border:1px solid var(--border2);color:var(--muted);padding:8px 20px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;border-radius:3px;margin-top:16px;transition:.2s;}
  .modal-close:hover{border-color:var(--text);color:var(--text);}

  @media(max-width:768px){
    nav{padding:0 20px;}
    .nav-links{display:none;}
    .hero{padding:40px 20px;}
    .main{padding:24px 20px;}
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">TICK<span>R</span></a>
    <ul class="nav-links">
    <li><a href="/#countdown">카운트다운</a></li>
    <li><a href="/#features">기능</a></li>
    <li><a href="/#sites">사이트 공략</a></li>
    <li><a href="/reviews.html">커뮤니티</a></li>
    <li><a href="/teams.html">팀 모집</a></li>
    <li><a href="/difficulty.html" class="active">난이도</a></li>
    <li><a href="/schedule.html">일정</a></li>
    <li><a href="/tips.html">꿀팁</a></li>
    <li><a href="/dday.html">D-day 루틴</a></li>
  </ul>
  <div class="nav-right">
    <button class="nav-cta" onclick="location.href='/'">무료 시작</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-tag">📈 난이도 지수</div>
  <h1>이 공연,<br><span>얼마나 어렵나?</span></h1>
  <p>실제 티켓팅 후기 데이터를 기반으로 공연별 난이도를 분석했어요. 미리 전략을 세워보세요.</p>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--d1)"></div><span class="legend-label" style="color:var(--d1)">극악 — 성공률 25% 미만</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--d2)"></div><span class="legend-label" style="color:var(--d2)">어려움 — 25~50%</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--d3)"></div><span class="legend-label" style="color:var(--d3)">보통 — 50~75%</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--d4)"></div><span class="legend-label" style="color:var(--d4)">쉬운 편 — 75% 이상</span></div>
  </div>
</div>

<div class="main">
  <div class="controls">
    <input class="search-input" id="searchInput" placeholder="아티스트 또는 공연명 검색..." oninput="renderCards()">
    <button class="filter-btn active" onclick="setFilter('all', event)">전체</button>
    <button class="filter-btn" onclick="setFilter('extreme', event)">극악</button>
    <button class="filter-btn" onclick="setFilter('hard', event)">어려움</button>
    <button class="filter-btn" onclick="setFilter('medium', event)">보통</button>
    <button class="filter-btn" onclick="setFilter('easy', event)">쉬운 편</button>
  </div>
  <div class="grid" id="cardsGrid">
    <div class="loading-state"><div class="loading-spinner"></div><p>데이터 분석 중...</p></div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
  <div class="modal">
    <div id="modalContent"></div>
    <button class="modal-close" onclick="document.getElementById('detailModal').classList.remove('active')">닫기</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tugudltjvkmlsnxsxfxk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_jyrfna8HsUOO8bMOB2hVag_JFN6AbLb';
const siteLabels = {melon:'멜론티켓',interpark:'인터파크',yes24:'YES24',coupang:'쿠팡플레이',ticketlink:'티켓링크',other:'기타'};

let grouped = [];
let currentFilter = 'all';
let allReviews = [];

async function loadData() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/reviews?is_approved=eq.true&order=created_at.desc`, {
      headers: {'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`}
    });
    allReviews = await res.json();
    groupByArtist();
    renderCards();
  } catch(e) {
    document.getElementById('cardsGrid').innerHTML = '<div class="empty-state"><p>데이터를 불러올 수 없어요.</p></div>';
  }
}

function groupByArtist() {
  const map = {};
  allReviews.forEach(r => {
    const key = `${r.artist_name}__${r.concert_name}__${r.ticketing_site}`;
    if(!map[key]) map[key] = {artist: r.artist_name, concert: r.concert_name, site: r.ticketing_site, reviews: []};
    map[key].reviews.push(r);
  });
  grouped = Object.values(map).map(g => {
    const total = g.reviews.length;
    const success = g.reviews.filter(r => r.success).length;
    const rate = total ? Math.round(success / total * 100) : 0;
    const avgRating = total ? (g.reviews.reduce((s,r) => s + (r.rating||3), 0) / total).toFixed(1) : 0;
    let diff, diffLabel;
    if(rate < 25) { diff = 'extreme'; diffLabel = '🔴 극악'; }
    else if(rate < 50) { diff = 'hard'; diffLabel = '🟠 어려움'; }
    else if(rate < 75) { diff = 'medium'; diffLabel = '🟡 보통'; }
    else { diff = 'easy'; diffLabel = '🟢 쉬운 편'; }
    return {...g, total, success, fail: total - success, rate, avgRating, diff, diffLabel};
  }).sort((a,b) => a.rate - b.rate);
}

function setFilter(f, e) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if(e) e.target.classList.add('active');
  renderCards();
}

function renderCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = grouped;
  if(currentFilter !== 'all') list = list.filter(g => g.diff === currentFilter);
  if(q) list = list.filter(g => g.artist.toLowerCase().includes(q) || g.concert.toLowerCase().includes(q));

  if(!list.length) {
    document.getElementById('cardsGrid').innerHTML = '<div class="empty-state"><p>아직 데이터가 없어요.<br>후기를 작성하면 난이도가 자동으로 분석돼요! 📊</p></div>';
    return;
  }

  document.getElementById('cardsGrid').innerHTML = list.map((g,i) => `
    <div class="diff-card" style="animation-delay:${i*0.05}s" onclick="openDetail('${esc(g.artist)}', '${esc(g.concert)}', '${g.site}')">
      <div class="card-header">
        <div class="card-artist">${esc(g.artist)}</div>
        <span class="diff-badge diff-${g.diff}">${g.diffLabel}</span>
      </div>
      <div class="card-concert">${esc(g.concert)}</div>
      <div class="card-site">${siteLabels[g.site]||g.site}</div>

      <div class="progress-section">
        <div class="progress-label"><span>성공률</span><span style="font-weight:700;color:${g.rate>=50?'#16a34a':'#dc2626'}">${g.rate}%</span></div>
        <div class="progress-bar"><div class="progress-fill fill-success" style="width:${g.rate}%"></div></div>
      </div>

      <div class="card-stats">
        <div class="stat-item"><div class="stat-num">${g.total}</div><div class="stat-label">총 후기</div></div>
        <div class="stat-item"><div class="stat-num" style="color:#22c55e">${g.success}</div><div class="stat-label">성공</div></div>
        <div class="stat-item"><div class="stat-num" style="color:var(--accent)">${g.fail}</div><div class="stat-label">실패</div></div>
      </div>

      <div class="card-rating">
        <span class="stars">${'★'.repeat(Math.round(g.avgRating))}${'☆'.repeat(5-Math.round(g.avgRating))}</span>
        <span class="rating-num">평균 ${g.avgRating}점</span>
      </div>
    </div>`).join('');
}

function openDetail(artist, concert, site) {
  const g = grouped.find(x => x.artist === artist && x.concert === concert && x.site === site);
  if(!g) return;
  document.getElementById('modalContent').innerHTML = `
    <h3>${esc(g.concert)}</h3>
    <div class="modal-artist">${esc(g.artist)} · ${siteLabels[g.site]||g.site} · <span class="diff-badge diff-${g.diff}">${g.diffLabel}</span></div>
    <div style="margin-bottom:20px;">
      <div class="progress-label" style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px;"><span>성공률</span><span style="font-weight:700">${g.rate}%</span></div>
      <div class="progress-bar"><div class="progress-fill fill-success" style="width:${g.rate}%"></div></div>
    </div>
    ${g.reviews.map(r => `
      <div class="review-item">
        <div class="review-result">${r.success ? '✅ 성공' : '❌ 실패'} · ${'★'.repeat(r.rating||3)}${'☆'.repeat(5-(r.rating||3))}</div>
        <div class="review-title">${esc(r.title)}</div>
        <div class="review-content">${esc(r.content)}</div>
        ${r.tips ? `<div style="margin-top:6px;font-size:12px;color:var(--accent)">💡 ${esc(r.tips)}</div>` : ''}
        <div class="review-nick">— ${esc(r.nickname)}</div>
      </div>`).join('')}
  `;
  document.getElementById('detailModal').classList.add('active');
}

function closeModal(e) {
  if(e.target === document.getElementById('detailModal')) document.getElementById('detailModal').classList.remove('active');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

loadData();
</script>
</body>
</html>
