<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TICKR — 티켓팅 일정 통합</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f7f5; --surface: #ffffff; --border: #e5e2dd; --border2: #d4d0ca;
    --accent: #ff3c00; --accent-light: rgba(255,60,0,0.08);
    --text: #1a1814; --text2: #3d3a35; --muted: #8a8680; --gray: #f2f0ec;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;}

  nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:68px;background:rgba(248,247,245,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.08em;color:var(--text);text-decoration:none;}
  .logo span{color:var(--accent);}
  .nav-links{display:flex;gap:28px;list-style:none;}
  .nav-links a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:400;transition:color .2s;}
  .nav-links a:hover,.nav-links a.active{color:var(--text);}
  .nav-right{display:flex;align-items:center;gap:12px;}
  .nav-cta{background:var(--accent);color:#fff;border:none;padding:9px 20px;font-size:13px;font-weight:500;cursor:pointer;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);font-family:'Noto Sans KR',sans-serif;transition:background .2s;}
  .nav-cta:hover{background:#e03000;}

  .hero{padding:60px 48px 48px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 80% 50%,rgba(255,60,0,0.05),transparent 70%);pointer-events:none;}
  .hero-tag{display:inline-block;border:1px solid var(--accent);color:var(--accent);background:var(--accent-light);font-size:11px;letter-spacing:.2em;padding:5px 14px;margin-bottom:20px;text-transform:uppercase;}
  .hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,8vw,96px);line-height:.95;margin-bottom:20px;}
  .hero h1 span{color:var(--accent);}
  .hero p{color:var(--muted);font-size:15px;max-width:500px;line-height:1.7;}
  .hero-stats{display:flex;gap:40px;margin-top:32px;}
  .stat-item{display:flex;flex-direction:column;gap:4px;}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--accent);}
  .stat-label{font-size:12px;color:var(--muted);}

  .main{max-width:1100px;margin:0 auto;padding:40px 48px;}

  /* 사이트 필터 탭 */
  .site-tabs{display:flex;gap:6px;margin-bottom:32px;flex-wrap:wrap;}
  .site-tab{background:var(--surface);border:1px solid var(--border2);color:var(--muted);padding:8px 16px;font-size:12px;font-weight:700;border-radius:4px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:.2s;}
  .site-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .site-tab:hover:not(.active){border-color:var(--accent);color:var(--accent);}

  /* 캘린더 헤더 */
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .cal-title{font-family:'Bebas Neue',sans-serif;font-size:32px;}
  .cal-nav{display:flex;gap:8px;}
  .cal-btn{background:var(--surface);border:1px solid var(--border2);color:var(--text);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;border-radius:4px;transition:.2s;}
  .cal-btn:hover{border-color:var(--accent);color:var(--accent);}

  /* 캘린더 그리드 */
  .calendar{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:40px;}
  .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--gray);border-bottom:1px solid var(--border);}
  .cal-weekday{padding:10px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em;}
  .cal-weekday:first-child{color:var(--accent);}
  .cal-weekday:last-child{color:#4169e1;}
  .cal-days{display:grid;grid-template-columns:repeat(7,1fr);}
  .cal-day{min-height:90px;padding:8px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);position:relative;transition:background .2s;}
  .cal-day:nth-child(7n){border-right:none;}
  .cal-day:hover{background:var(--gray);}
  .cal-day.other-month .day-num{color:#ccc;}
  .cal-day.today{background:var(--accent-light);}
  .cal-day.today .day-num{color:var(--accent);font-weight:700;}
  .day-num{font-size:12px;color:var(--text2);margin-bottom:4px;}
  .cal-day:nth-child(7n+1) .day-num{color:var(--accent);}
  .cal-day:nth-child(7n) .day-num{color:#4169e1;}

  /* 공연 이벤트 */
  .event{font-size:10px;font-weight:700;padding:2px 5px;border-radius:2px;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:.2s;}
  .event:hover{opacity:.8;}
  .event-interpark{background:rgba(255,60,0,.12);color:#c02800;}
  .event-yes24{background:rgba(0,100,200,.1);color:#0050a0;}
  .event-melon{background:rgba(0,180,80,.1);color:#008040;}
  .event-naver{background:rgba(0,200,0,.1);color:#007000;}
  .event-coupang{background:rgba(255,100,0,.1);color:#c05000;}
  .event-ticketlink{background:rgba(100,0,200,.1);color:#5000a0;}
  .event-other{background:rgba(100,100,100,.1);color:#505050;}
  .more-events{font-size:10px;color:var(--muted);padding:2px 5px;cursor:pointer;}
  .more-events:hover{color:var(--accent);}

  /* 리스트 뷰 */
  .list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .list-title{font-family:'Bebas Neue',sans-serif;font-size:22px;}
  .view-toggle{display:flex;gap:6px;}
  .view-btn{background:var(--surface);border:1px solid var(--border2);color:var(--muted);padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border-radius:3px;transition:.2s;}
  .view-btn.active{background:var(--text);border-color:var(--text);color:#fff;}

  .concert-list{display:flex;flex-direction:column;gap:12px;}
  .concert-item{background:var(--surface);border:1px solid var(--border);padding:20px 24px;display:flex;align-items:center;gap:20px;transition:box-shadow .2s;border-radius:4px;}
  .concert-item:hover{box-shadow:0 4px 20px rgba(0,0,0,0.06);}
  .concert-date-box{min-width:60px;text-align:center;background:var(--gray);border:1px solid var(--border);padding:10px 8px;border-radius:4px;}
  .date-month{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;}
  .date-day{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;color:var(--text);}
  .date-time{font-size:10px;color:var(--muted);margin-top:2px;}
  .concert-info{flex:1;}
  .concert-artist{font-size:12px;color:var(--accent);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;}
  .concert-name{font-size:16px;font-weight:500;margin-bottom:6px;}
  .concert-meta{display:flex;gap:12px;flex-wrap:wrap;}
  .meta-badge{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;}
  .site-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;}
  .d-day-badge{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--accent);}
  .d-day-passed{color:var(--muted);}
  .open-btn{background:var(--accent);color:#fff;border:none;padding:10px 20px;font-size:12px;font-weight:700;cursor:pointer;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:background .2s;}
  .open-btn:hover{background:#e03000;}
  .open-btn.passed{background:var(--border2);color:var(--muted);clip-path:none;border-radius:3px;cursor:default;}

  .loading-state,.empty-state{text-align:center;padding:60px;color:var(--muted);}
  .loading-spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:768px){
    nav{padding:0 20px;}
    .nav-links{display:none;}
    .hero{padding:40px 20px;}
    .main{padding:24px 20px;}
    .cal-day{min-height:60px;}
    .concert-item{flex-wrap:wrap;}
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">TICK<span>R</span></a>
    <ul class="nav-links">
    <li><a href="/#countdown">카운트다운</a></li>
    <li><a href="/#features">기능</a></li>
    <li><a href="/#sites">사이트 공략</a></li>
    <li><a href="/reviews.html">커뮤니티</a></li>
    <li><a href="/teams.html">팀 모집</a></li>
    <li><a href="/difficulty.html">난이도</a></li>
    <li><a href="/schedule.html" class="active">일정</a></li>
    <li><a href="/dday.html">D-day 루틴</a></li>
  </ul>
  <div class="nav-right">
    <button class="nav-cta" onclick="location.href='/'">무료 시작</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-tag">📋 일정 통합</div>
  <h1>모든 티켓팅<br><span>한눈에!</span></h1>
  <p>인터파크, YES24, 멜론티켓, 네이버 등 모든 플랫폼의 티켓팅 오픈 일정을 한 화면에서 확인하세요.</p>
  <div class="hero-stats">
    <div class="stat-item"><span class="stat-num" id="totalConcerts">—</span><span class="stat-label">등록된 공연</span></div>
    <div class="stat-item"><span class="stat-num" id="upcomingConcerts">—</span><span class="stat-label">오픈 예정</span></div>
  </div>
</div>

<div class="main">
  <!-- 사이트 필터 -->
  <div class="site-tabs">
    <button class="site-tab active" onclick="setSite('all', event)">전체</button>
    <button class="site-tab" onclick="setSite('인터파크', event)">인터파크</button>
    <button class="site-tab" onclick="setSite('YES24', event)">YES24</button>
    <button class="site-tab" onclick="setSite('멜론티켓', event)">멜론티켓</button>
    <button class="site-tab" onclick="setSite('네이버예약', event)">네이버</button>
    <button class="site-tab" onclick="setSite('티켓링크', event)">티켓링크</button>
    <button class="site-tab" onclick="setSite('위버스샵', event)">위버스샵</button>
  </div>

  <!-- 캘린더 -->
  <div class="cal-header">
    <div class="cal-title" id="calTitle"></div>
    <div class="cal-nav">
      <button class="cal-btn" onclick="changeMonth(-1)">‹</button>
      <button class="cal-btn" onclick="changeMonth(0)">오늘</button>
      <button class="cal-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="calendar">
    <div class="cal-weekdays">
      <div class="cal-weekday">일</div><div class="cal-weekday">월</div>
      <div class="cal-weekday">화</div><div class="cal-weekday">수</div>
      <div class="cal-weekday">목</div><div class="cal-weekday">금</div>
      <div class="cal-weekday">토</div>
    </div>
    <div class="cal-days" id="calDays"></div>
  </div>

  <!-- 리스트 뷰 -->
  <div class="list-header">
    <div class="list-title">전체 일정</div>
    <div class="view-toggle">
      <button class="view-btn active" onclick="setSort('upcoming', event)">다가오는 순</button>
      <button class="view-btn" onclick="setSort('recent', event)">최근 등록순</button>
    </div>
  </div>
  <div class="concert-list" id="concertList">
    <div class="loading-state"><div class="loading-spinner"></div><p>일정 불러오는 중...</p></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tugudltjvkmlsnxsxfxk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_jyrfna8HsUOO8bMOB2hVag_JFN6AbLb';

let concerts = [];
let currentSite = 'all';
let currentSort = 'upcoming';
let calYear, calMonth;

const siteColors = {
  '인터파크':'event-interpark','YES24':'event-yes24','멜론티켓':'event-melon',
  '네이버예약':'event-naver','티켓링크':'event-ticketlink','위버스샵':'event-other',
  '쿠팡플레이':'event-coupang'
};
const siteUrls = {
  '인터파크':'https://tickets.interpark.com','YES24':'https://ticket.yes24.com',
  '멜론티켓':'https://ticket.melon.com','네이버예약':'https://booking.naver.com',
  '티켓링크':'https://www.ticketlink.co.kr','위버스샵':'https://shop.weverse.io'
};
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const monthsKo = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

async function loadConcerts() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/concerts?order=open_time.asc`, {
      headers: {'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`}
    });
    concerts = await res.json();
    document.getElementById('totalConcerts').textContent = concerts.length;
    document.getElementById('upcomingConcerts').textContent = concerts.filter(c => new Date(c.open_time) > new Date()).length;
    renderCalendar();
    renderList();
  } catch(e) {
    document.getElementById('concertList').innerHTML = '<div class="empty-state"><p>일정을 불러올 수 없어요.</p></div>';
  }
}

function setSite(site, e) {
  currentSite = site;
  document.querySelectorAll('.site-tab').forEach(t => t.classList.remove('active'));
  if(e) e.target.classList.add('active');
  renderCalendar();
  renderList();
}

function setSort(sort, e) {
  currentSort = sort;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  if(e) e.target.classList.add('active');
  renderList();
}

function filtered() {
  if(currentSite === 'all') return concerts;
  return concerts.filter(c => c.ticket_site === currentSite);
}

function changeMonth(dir) {
  if(dir === 0) { const n = new Date(); calYear = n.getFullYear(); calMonth = n.getMonth(); }
  else { calMonth += dir; if(calMonth > 11) {calMonth=0;calYear++;} if(calMonth < 0) {calMonth=11;calYear--;} }
  renderCalendar();
}

function renderCalendar() {
  const now = new Date();
  document.getElementById('calTitle').textContent = `${calYear} ${monthsKo[calMonth]}`;
  const first = new Date(calYear, calMonth, 1).getDay();
  const days = new Date(calYear, calMonth+1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();
  const list = filtered();

  let html = '';
  // 이전 달
  for(let i = first-1; i >= 0; i--) {
    html += `<div class="cal-day other-month"><div class="day-num">${prevDays-i}</div></div>`;
  }
  // 이번 달
  for(let d = 1; d <= days; d++) {
    const isToday = now.getFullYear()===calYear && now.getMonth()===calMonth && now.getDate()===d;
    const dayEvents = list.filter(c => {
      const t = new Date(c.open_time);
      return t.getFullYear()===calYear && t.getMonth()===calMonth && t.getDate()===d;
    });
    const colorClass = c => siteColors[c.ticket_site] || 'event-other';
    const shown = dayEvents.slice(0,2);
    const more = dayEvents.length - 2;
    html += `<div class="cal-day${isToday?' today':''}">
      <div class="day-num">${d}</div>
      ${shown.map(c=>`<div class="event ${colorClass(c)}" title="${c.artist} - ${c.ticket_site}" onclick="window.open('${c.ticket_url||siteUrls[c.ticket_site]||'#'}','_blank')">${c.artist}</div>`).join('')}
      ${more > 0 ? `<div class="more-events">+${more}개</div>` : ''}
    </div>`;
  }
  // 다음 달
  const total = first + days;
  const remain = total % 7 === 0 ? 0 : 7 - (total % 7);
  for(let i = 1; i <= remain; i++) {
    html += `<div class="cal-day other-month"><div class="day-num">${i}</div></div>`;
  }
  document.getElementById('calDays').innerHTML = html;
}

function renderList() {
  let list = filtered();
  if(currentSort === 'upcoming') {
    list = [...list].sort((a,b) => new Date(a.open_time) - new Date(b.open_time));
  }
  if(!list.length) {
    document.getElementById('concertList').innerHTML = '<div class="empty-state"><p>등록된 공연이 없어요.<br>관리자 페이지에서 공연을 추가해보세요!</p></div>';
    return;
  }
  const now = new Date();
  document.getElementById('concertList').innerHTML = list.map(c => {
    const t = new Date(c.open_time);
    const diff = Math.ceil((t - now) / 86400000);
    const passed = diff < 0;
    const dday = passed ? '종료' : diff === 0 ? 'D-DAY' : `D-${diff}`;
    return `
    <div class="concert-item">
      <div class="concert-date-box">
        <div class="date-month">${months[t.getMonth()].slice(0,3).toUpperCase()}</div>
        <div class="date-day">${t.getDate()}</div>
        <div class="date-time">${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}</div>
      </div>
      <div class="concert-info">
        <div class="concert-artist">${esc(c.artist)}</div>
        <div class="concert-name">${esc(c.artist)} 티켓팅 오픈</div>
        <div class="concert-meta">
          <span class="meta-badge">🎟 ${esc(c.ticket_site)||'미정'}</span>
          ${c.venue ? `<span class="meta-badge">📍 ${esc(c.venue)}</span>` : ''}
          <span class="meta-badge">📅 ${t.getFullYear()}.${String(t.getMonth()+1).padStart(2,'0')}.${String(t.getDate()).padStart(2,'0')}</span>
        </div>
      </div>
      <div class="d-day-badge ${passed?'d-day-passed':''}">${dday}</div>
      <button class="open-btn ${passed?'passed':''}" ${passed?'disabled':''} onclick="window.open('${c.ticket_url||siteUrls[c.ticket_site]||'#'}','_blank')">
        ${passed ? '종료' : '사이트 열기 →'}
      </button>
    </div>`;
  }).join('');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// 초기화
const now = new Date();
calYear = now.getFullYear();
calMonth = now.getMonth();
loadConcerts();
</script>
</body>
</html>
