<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TICKR — D-day 준비 루틴</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f7f5; --surface: #ffffff; --border: #e5e2dd; --border2: #d4d0ca;
    --accent: #ff3c00; --accent-light: rgba(255,60,0,0.08);
    --text: #1a1814; --text2: #3d3a35; --muted: #8a8680; --gray: #f2f0ec;
    --success: #16a34a; --success-bg: #dcfce7;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;}

  nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:68px;background:rgba(248,247,245,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.08em;color:var(--text);text-decoration:none;}
  .logo span{color:var(--accent);}
  .nav-links{display:flex;gap:28px;list-style:none;}
  .nav-links a{color:var(--muted);text-decoration:none;font-size:13px;transition:color .2s;}
  .nav-links a:hover,.nav-links a.active{color:var(--text);}
  .nav-cta{background:var(--accent);color:#fff;border:none;padding:9px 20px;font-size:13px;font-weight:500;cursor:pointer;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);font-family:'Noto Sans KR',sans-serif;transition:background .2s;}
  .nav-cta:hover{background:#e03000;}

  .hero{padding:60px 48px 48px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 80% 50%,rgba(255,60,0,0.05),transparent 70%);pointer-events:none;}
  .hero-tag{display:inline-block;border:1px solid var(--accent);color:var(--accent);background:var(--accent-light);font-size:11px;letter-spacing:.2em;padding:5px 14px;margin-bottom:20px;text-transform:uppercase;}
  .hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,8vw,96px);line-height:.95;margin-bottom:20px;}
  .hero h1 span{color:var(--accent);}
  .hero p{color:var(--muted);font-size:15px;max-width:500px;line-height:1.7;}

  /* 진행률 바 */
  .progress-bar-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 48px;position:sticky;top:68px;z-index:99;}
  .progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .progress-title{font-size:13px;font-weight:500;color:var(--text2);}
  .progress-pct{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);}
  .progress-bar{height:6px;background:var(--gray);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease;}
  .reset-btn{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:color .2s;}
  .reset-btn:hover{color:var(--accent);}

  /* 메인 레이아웃 */
  .main{display:grid;grid-template-columns:240px 1fr;max-width:1100px;margin:0 auto;}

  /* 사이드 네비 */
  .side-nav{padding:32px 24px;position:sticky;top:130px;height:calc(100vh - 130px);overflow-y:auto;border-right:1px solid var(--border);}
  .side-nav-title{font-size:10px;font-weight:700;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:16px;}
  .side-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:4px;cursor:pointer;transition:background .2s;margin-bottom:4px;text-decoration:none;}
  .side-item:hover{background:var(--gray);}
  .side-item.active{background:var(--accent-light);}
  .side-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;transition:.2s;}
  .side-dot.done{background:var(--success);border-color:var(--success);}
  .side-dot.active-dot{border-color:var(--accent);}
  .side-label{font-size:12px;color:var(--text2);font-weight:400;}
  .side-count{font-size:10px;color:var(--muted);margin-left:auto;}

  /* 컨텐츠 */
  .content{padding:40px 48px;}

  /* 단계 섹션 */
  .phase{margin-bottom:48px;animation:fadeUp .4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .phase-header{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid var(--border);}
  .phase-icon{font-size:28px;}
  .phase-info{}
  .phase-time{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;margin-bottom:4px;}
  .phase-title{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;}
  .phase-desc{font-size:13px;color:var(--muted);margin-top:4px;}
  .phase-progress{margin-left:auto;text-align:right;}
  .phase-pct{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent);}
  .phase-count{font-size:11px;color:var(--muted);}

  /* 체크 아이템 */
  .check-list{display:flex;flex-direction:column;gap:10px;}
  .check-item{display:flex;align-items:flex-start;gap:14px;background:var(--surface);border:1px solid var(--border);padding:16px 18px;border-radius:4px;cursor:pointer;transition:all .2s;user-select:none;}
  .check-item:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,0.04);}
  .check-item.checked{background:var(--success-bg);border-color:rgba(22,163,74,.3);}
  .check-box{width:20px;height:20px;border:2px solid var(--border2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s;}
  .check-item.checked .check-box{background:var(--success);border-color:var(--success);}
  .check-icon{font-size:11px;color:#fff;font-weight:700;display:none;}
  .check-item.checked .check-icon{display:block;}
  .check-text{}
  .check-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px;transition:color .2s;}
  .check-item.checked .check-title{color:var(--success);text-decoration:line-through;}
  .check-desc{font-size:12px;color:var(--muted);line-height:1.6;}
  .check-tip{display:inline-block;margin-top:6px;font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-light);padding:2px 8px;border-radius:2px;}

  /* 완료 배너 */
  .complete-banner{display:none;background:linear-gradient(135deg,#166534,#15803d);color:#fff;padding:32px;border-radius:4px;text-align:center;margin-bottom:32px;animation:fadeUp .5s ease both;}
  .complete-banner.show{display:block;}
  .complete-banner h2{font-family:'Bebas Neue',sans-serif;font-size:36px;margin-bottom:8px;}
  .complete-banner p{font-size:14px;opacity:.85;line-height:1.6;}

  @media(max-width:768px){
    nav{padding:0 20px;}
    .nav-links{display:none;}
    .hero{padding:40px 20px;}
    .progress-bar-wrap{padding:16px 20px;}
    .main{grid-template-columns:1fr;}
    .side-nav{display:none;}
    .content{padding:24px 20px;}
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">TICK<span>R</span></a>
  <ul class="nav-links">
    <li><a href="/#countdown">카운트다운</a></li>
    <li><a href="/#features">기능</a></li>
    <li><a href="/reviews.html">커뮤니티</a></li>
    <li><a href="/teams.html">팀 모집</a></li>
    <li><a href="/difficulty.html">난이도</a></li>
    <li><a href="/schedule.html">일정</a></li>
    <li><a href="/dday.html" class="active">D-day 루틴</a></li>
  </ul>
  <div class="nav-right">
    <button class="nav-cta" onclick="location.href='/'">무료 시작</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-tag">✅ D-day 루틴</div>
  <h1>티켓팅 당일<br><span>완벽 준비!</span></h1>
  <p>오픈 당일 아침부터 결제까지, 단계별로 따라하면 절대 실수하지 않아요. 하나씩 체크해보세요!</p>
</div>

<!-- 진행률 -->
<div class="progress-bar-wrap">
  <div class="progress-header">
    <span class="progress-title">전체 진행률 <span id="checkedCount">0</span>/<span id="totalCount">0</span> 완료</span>
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="reset-btn" onclick="resetAll()">↺ 초기화</button>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="main">
  <!-- 사이드 네비 -->
  <div class="side-nav">
    <div class="side-nav-title">단계별 루틴</div>
    <div id="sideNav"></div>
  </div>

  <!-- 메인 컨텐츠 -->
  <div class="content">
    <div class="complete-banner" id="completeBanner">
      <h2>🎉 모든 준비 완료!</h2>
      <p>완벽하게 준비됐어요. 이제 티켓팅 오픈만 기다리세요!<br>행운을 빕니다 🍀</p>
    </div>
    <div id="checklistContent"></div>
  </div>
</div>

<script>
const phases = [
  {
    id: 'dday3',
    icon: '📅',
    time: 'D-3 ~ D-1',
    title: '오픈 전날까지',
    desc: '미리 준비해두면 당일 여유로워져요',
    items: [
      {id:'c1', title:'티켓팅 오픈 일시 정확히 확인', desc:'날짜, 시간, 사이트 3가지를 모두 메모해두세요. TICKR 일정 페이지에서 확인 가능해요.'},
      {id:'c2', title:'해당 사이트 회원가입 및 로그인 확인', desc:'오픈 당일 로그인이 안 되면 큰일! 미리 비밀번호도 테스트해보세요.', tip:'⚠️ 아이디/비밀번호 오늘 꼭 확인'},
      {id:'c3', title:'간편결제 수단 등록', desc:'카카오페이, 네이버페이, 카드 자동결제 등을 미리 등록해두세요. 결제까지 30초 안에 끝내야 해요.', tip:'💡 카카오페이가 가장 빠름'},
      {id:'c4', title:'배송지 주소 등록 확인', desc:'일부 사이트는 배송지가 없으면 결제가 안 돼요. 미리 등록해두세요.'},
      {id:'c5', title:'앱 최신 버전 업데이트', desc:'구버전 앱은 오픈 당일 오류가 생길 수 있어요. 앱스토어에서 업데이트 확인!'},
    ]
  },
  {
    id: 'morning',
    icon: '☀️',
    time: '당일 오전',
    title: '아침 준비',
    desc: '오픈 2~3시간 전부터 시작해요',
    items: [
      {id:'c6', title:'PC + 스마트폰 2기기 준비', desc:'PC가 끊기면 모바일로 대기하는 게 가능해요. 두 기기 모두 로그인 상태로 준비하세요.', tip:'💡 PC 크롬 + 모바일 앱 동시 준비'},
      {id:'c7', title:'브라우저 캐시 & 쿠키 삭제', desc:'크롬 기준: 설정 → 개인정보 → 인터넷 사용 기록 삭제. 시크릿 모드도 하나 열어두세요.'},
      {id:'c8', title:'인터넷 연결 상태 확인', desc:'와이파이보다 유선 인터넷이 더 안정적이에요. 가능하면 유선 연결 권장.', tip:'⚠️ 와이파이는 불안정할 수 있음'},
      {id:'c9', title:'다른 프로그램 모두 종료', desc:'불필요한 탭, 프로그램을 모두 닫아서 컴퓨터 속도를 최대화하세요.'},
    ]
  },
  {
    id: 'before30',
    icon: '⏰',
    time: '오픈 30분 전',
    title: '카운트다운 시작',
    desc: '이제부터 집중! 이탈 금지',
    items: [
      {id:'c10', title:'티켓팅 페이지 미리 열어두기', desc:'구매 페이지 URL을 북마크하거나 탭에 열어두세요. TICKR 일정 페이지에서 바로 이동 가능해요.'},
      {id:'c11', title:'로그인 상태 최종 확인', desc:'이 시점에 다시 한번 로그인 상태인지 확인하세요. 세션이 끊겨있으면 즉시 재로그인!', tip:'⚠️ 세션 만료 주의'},
      {id:'c12', title:'좌석 등급/구역 우선순위 정하기', desc:'어느 구역이 안되면 차선책으로 어디를 노릴지 미리 정해두세요. 망설이면 늦어요.'},
      {id:'c13', title:'팀원과 역할 분담 완료', desc:'팀 티켓팅이라면 누가 어느 구역을 노릴지 미리 정해두세요. 중복 시도 방지!'},
    ]
  },
  {
    id: 'before5',
    icon: '🔥',
    time: '오픈 5분 전',
    title: '최종 점검',
    desc: '절대로 새로고침하지 마세요!',
    items: [
      {id:'c14', title:'대기열 입장 (사이트마다 다름)', desc:'인터파크는 오픈 전 대기열 입장. 한번 들어가면 새로고침 절대 금지!', tip:'🚨 인터파크: F5 누르면 순번 날아감'},
      {id:'c15', title:'결제 정보 화면에 띄워두기', desc:'카드번호, 유효기간을 별도 메모장에 복사해두면 입력 시간을 줄일 수 있어요.'},
      {id:'c16', title:'손 스트레칭 완료 😄', desc:'진짜예요. 긴장하면 손이 굳어요. 가볍게 손목을 풀어주세요.'},
    ]
  },
  {
    id: 'open',
    icon: '🎯',
    time: '오픈 직후',
    title: '티켓팅 실전',
    desc: '빠르게, 침착하게!',
    items: [
      {id:'c17', title:'좌석 선택 — 고민 말고 빠르게!', desc:'완벽한 자리 찾다가 모두 매진돼요. 일단 잡고 나서 생각하세요. 5초 안에 결정!', tip:'💡 1열이 아니어도 OK, 일단 잡자'},
      {id:'c18', title:'결제 정보 신속 입력', desc:'카드번호는 미리 복사해둔 것을 붙여넣기. 간편결제라면 비밀번호만 누르면 끝!'},
      {id:'c19', title:'최종 결제 완료 확인', desc:'결제 완료 페이지 + 이메일 + 마이페이지 3군데에서 모두 확인해야 진짜 완료예요.', tip:'✅ 이메일 확인 필수'},
    ]
  },
  {
    id: 'after',
    icon: '🎉',
    time: '결제 후',
    title: '마무리',
    desc: '수고했어요! 마지막 확인만 남았어요',
    items: [
      {id:'c20', title:'예매 확인증 캡처/저장', desc:'예매 확인 페이지를 스크린샷으로 저장해두세요. 나중에 분쟁 시 필요할 수 있어요.'},
      {id:'c21', title:'공연 날짜 캘린더에 등록', desc:'기쁜 날! 캘린더에 공연 날짜, 장소, 입장 시간을 등록해두세요.'},
      {id:'c22', title:'TICKR에 후기 남기기 😊', desc:'성공/실패 경험을 공유해서 다른 팬들을 도와주세요! 커뮤니티가 함께 성장해요.', tip:'👉 reviews.html에서 후기 작성'},
    ]
  }
];

const checked = JSON.parse(localStorage.getItem('tickr_dday') || '{}');

function saveChecked() {
  localStorage.setItem('tickr_dday', JSON.stringify(checked));
}

function updateProgress() {
  const total = phases.reduce((s,p) => s + p.items.length, 0);
  const done = Object.values(checked).filter(Boolean).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('checkedCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('completeBanner').classList.toggle('show', pct === 100);
  updateSideNav();
}

function toggle(id) {
  checked[id] = !checked[id];
  const el = document.getElementById('item_' + id);
  el.classList.toggle('checked', checked[id]);
  saveChecked();
  updateProgress();
}

function resetAll() {
  if(!confirm('모든 체크를 초기화할까요?')) return;
  Object.keys(checked).forEach(k => delete checked[k]);
  saveChecked();
  document.querySelectorAll('.check-item').forEach(el => el.classList.remove('checked'));
  updateProgress();
}

function updateSideNav() {
  const html = phases.map(p => {
    const total = p.items.length;
    const done = p.items.filter(i => checked[i.id]).length;
    const allDone = done === total;
    return `<a class="side-item" href="#${p.id}">
      <div class="side-dot ${allDone?'done':''}"></div>
      <span class="side-label">${p.title}</span>
      <span class="side-count">${done}/${total}</span>
    </a>`;
  }).join('');
  document.getElementById('sideNav').innerHTML = html;
}

function renderChecklist() {
  document.getElementById('checklistContent').innerHTML = phases.map((p, pi) => `
    <div class="phase" id="${p.id}" style="animation-delay:${pi*0.08}s">
      <div class="phase-header">
        <div class="phase-icon">${p.icon}</div>
        <div class="phase-info">
          <div class="phase-time">${p.time}</div>
          <div class="phase-title">${p.title}</div>
          <div class="phase-desc">${p.desc}</div>
        </div>
        <div class="phase-progress">
          <div class="phase-pct" id="phasePct_${p.id}">0%</div>
          <div class="phase-count" id="phaseCount_${p.id}">0/${p.items.length}</div>
        </div>
      </div>
      <div class="check-list">
        ${p.items.map(item => `
          <div class="check-item ${checked[item.id]?'checked':''}" id="item_${item.id}" onclick="toggle('${item.id}')">
            <div class="check-box"><span class="check-icon">✓</span></div>
            <div class="check-text">
              <div class="check-title">${item.title}</div>
              <div class="check-desc">${item.desc}</div>
              ${item.tip ? `<span class="check-tip">${item.tip}</span>` : ''}
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
  updatePhaseProgress();
}

function updatePhaseProgress() {
  phases.forEach(p => {
    const total = p.items.length;
    const done = p.items.filter(i => checked[i.id]).length;
    const el = document.getElementById('phasePct_' + p.id);
    const el2 = document.getElementById('phaseCount_' + p.id);
    if(el) el.textContent = Math.round(done/total*100) + '%';
    if(el2) el2.textContent = `${done}/${total}`;
  });
}

// toggle 오버라이드해서 phase progress도 업데이트
const _toggle = toggle;
window.toggle = function(id) {
  checked[id] = !checked[id];
  const el = document.getElementById('item_' + id);
  el.classList.toggle('checked', checked[id]);
  saveChecked();
  updateProgress();
  updatePhaseProgress();
};

renderChecklist();
updateProgress();
</script>
